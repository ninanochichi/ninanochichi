        <rect x="-17" y="-1" width="34" height="42" rx="10" fill="#111827" stroke="#475569" stroke-width="2" />
        <rect x="-12" y="7" width="24" height="18" rx="4" fill="#1F2937" stroke="#64748B" stroke-width="1.5" />
        <path d="M-9 16h18M-6 21h12" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round" opacity="0.9" />
        <circle cx="0" cy="-18" r="18" fill="#F4C7A1" stroke="#0F172A" stroke-width="2" />
        <path d="M-17-21c5-15 28-18 35 0-12-6-24-5-35 0Z" fill="#111827" />
        <path d="M-7-17h3M6-17h3" stroke="#0F172A" stroke-width="2" stroke-linecap="round" />
        <path d="M-5-9c4 3 9 3 13 0" stroke="#0F172A" stroke-width="1.8" stroke-linecap="round" />
        <g stroke="#94A3B8" stroke-width="5" stroke-linecap="round">
          <line x1="-13" y1="38" x2="-23" y2="54">
            <animate attributeName="x2" values="-23;-14;-23" dur="0.8s" repeatCount="indefinite" />
          </line>
          <line x1="13" y1="38" x2="24" y2="54">
            <animate attributeName="x2" values="24;15;24" dur="0.8s" repeatCount="indefinite" />
          </line>
        </g>
        <g stroke="#64748B" stroke-width="4" stroke-linecap="round">
          <line x1="-18" y1="11" x2="-31" y2="27">
            <animate attributeName="x2" values="-31;-27;-31" dur="1.2s" repeatCount="indefinite" />
          </line>
          <line x1="18" y1="11" x2="31" y2="25">
            <animate attributeName="x2" values="31;27;31" dur="1.2s" repeatCount="indefinite" />
          </line>
        </g>
      </g>
    </g>
