  <text x="460" y="60" text-anchor="middle" fill="#F8FAFC" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="800" letter-spacing="4">KIM WOOJIN</text>
  <text x="460" y="91" text-anchor="middle" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">Frontend campfire: build, verify, improve</text>
