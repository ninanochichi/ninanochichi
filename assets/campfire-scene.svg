<svg width="920" height="320" viewBox="0 0 920 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Campfire developer scene</title>
  <desc id="desc">A dark campfire scene with a small developer character walking around the fire.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070A10" />
      <stop offset="0.56" stop-color="#111827" />
      <stop offset="1" stop-color="#0B0F17" />
    </linearGradient>
    <radialGradient id="fireGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(460 226) rotate(90) scale(92 190)">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.55" />
      <stop offset="0.45" stop-color="#F97316" stop-opacity="0.18" />
      <stop offset="1" stop-color="#111827" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect width="920" height="320" rx="22" fill="url(#sky)" />
  <rect x="18" y="18" width="884" height="284" rx="18" stroke="#30363D" stroke-width="2" />

  <g opacity="0.88">
    <circle cx="112" cy="58" r="1.7" fill="#E5E7EB"><animate attributeName="opacity" values="0.25;1;0.25" dur="4.4s" repeatCount="indefinite" /></circle>
    <circle cx="176" cy="104" r="1.3" fill="#CBD5E1"><animate attributeName="opacity" values="1;0.25;1" dur="5.2s" repeatCount="indefinite" /></circle>
    <circle cx="274" cy="48" r="1.4" fill="#94A3B8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.8s" repeatCount="indefinite" /></circle>
    <circle cx="648" cy="62" r="1.7" fill="#E5E7EB"><animate attributeName="opacity" values="1;0.2;1" dur="4.8s" repeatCount="indefinite" /></circle>
    <circle cx="786" cy="96" r="1.2" fill="#94A3B8"><animate attributeName="opacity" values="0.25;1;0.25" dur="5.1s" repeatCount="indefinite" /></circle>
    <path d="M759 45a18 18 0 1 1-18-18 14 14 0 0 0 18 18Z" fill="#E5E7EB" opacity="0.9" />
  </g>

  <path d="M34 216C86 182 122 181 176 214C226 164 280 164 336 215C392 180 446 180 500 216C554 170 612 170 674 218C744 176 806 184 886 219V302H34V216Z" fill="#111827" />
  <path d="M34 232C105 205 170 208 246 232C335 208 421 209 506 233C593 205 686 208 767 233C808 220 848 219 886 232V302H34V232Z" fill="#161B22" />
  <ellipse cx="460" cy="258" rx="332" ry="36" fill="#090D14" opacity="0.72" />
  <ellipse cx="460" cy="236" rx="178" ry="62" fill="url(#fireGlow)">
    <animate attributeName="opacity" values="0.55;0.95;0.62;0.88;0.55" dur="2.6s" repeatCount="indefinite" />
  </ellipse>

  <g transform="translate(460 226)" filter="url(#softGlow)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="1 1;1.08 0.92;0.96 1.06;1 1" dur="1.25s" repeatCount="indefinite" />
      <path d="M0-72C30-39 42-11 24 22C11 45-18 42-30 20C-43-3-27-36 0-72Z" fill="#F97316" />
      <path d="M0-48C18-23 24-2 11 20C2 35-17 32-23 16C-29-2-17-26 0-48Z" fill="#FACC15" />
      <path d="M8-26C18-10 19 4 10 17C3 27-9 23-12 12C-16 0-7-15 8-26Z" fill="#FFF7AD" opacity="0.95" />
    </g>
  </g>

