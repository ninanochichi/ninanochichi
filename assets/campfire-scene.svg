    <circle cx="76" cy="69" r="4" fill="#F97316" />
    <circle cx="91" cy="69" r="4" fill="#FACC15" />
    <circle cx="106" cy="69" r="4" fill="#22C55E" />
    <text x="76" y="97" fill="#CBD5E1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">npm run build</text>
    <path d="M76 107h98" stroke="#38BDF8" stroke-width="2" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0 120;120 0;0 120" dur="4s" repeatCount="indefinite" />
